basePath: /api/v1
definitions:
  geregetemplateai_internal_http_datatransfers_requests.AIChatRequest:
    properties:
      conversation_id:
        type: string
      message:
        maxLength: 4000
        minLength: 1
        type: string
    required:
    - message
    type: object
  geregetemplateai_internal_http_datatransfers_requests.AIKnowledgeRequest:
    properties:
      content:
        maxLength: 8000
        minLength: 1
        type: string
      title:
        maxLength: 200
        type: string
    required:
    - content
    type: object
  geregetemplateai_internal_http_datatransfers_requests.AdminCreateUserRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      role_id:
        minimum: 1
        type: integer
      username:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - email
    - password
    - role_id
    - username
    type: object
  geregetemplateai_internal_http_datatransfers_requests.AdminUpdateOrgRequest:
    properties:
      org_id:
        type: string
    required:
    - org_id
    type: object
  geregetemplateai_internal_http_datatransfers_requests.AdminUpdateRoleRequest:
    properties:
      role_id:
        minimum: 1
        type: integer
    required:
    - role_id
    type: object
  geregetemplateai_internal_http_datatransfers_requests.BPMGenerateRequest:
    properties:
      description:
        maxLength: 4000
        minLength: 4
        type: string
    required:
    - description
    type: object
  geregetemplateai_internal_http_datatransfers_requests.BPMSaveFormRequest:
    properties:
      name:
        maxLength: 200
        minLength: 1
        type: string
      schema:
        items:
          type: integer
        type: array
    required:
    - name
    - schema
    type: object
  geregetemplateai_internal_http_datatransfers_requests.BPMSaveProcessRequest:
    properties:
      bpmn:
        type: string
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      status:
        enum:
        - draft
        - published
        type: string
    required:
    - bpmn
    - name
    type: object
  geregetemplateai_internal_http_datatransfers_requests.BPMSubmitTaskRequest:
    properties:
      data:
        items:
          type: integer
        type: array
    required:
    - data
    type: object
  geregetemplateai_internal_http_datatransfers_requests.ChangePasswordRequest:
    properties:
      current_password:
        maxLength: 72
        minLength: 1
        type: string
      new_password:
        maxLength: 72
        minLength: 12
        type: string
    required:
    - current_password
    - new_password
    type: object
  geregetemplateai_internal_http_datatransfers_requests.CreateRoleRequest:
    properties:
      description:
        maxLength: 500
        type: string
      key:
        maxLength: 50
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  geregetemplateai_internal_http_datatransfers_requests.FedPeerCreateRequest:
    properties:
      base_url:
        type: string
      jwks_url:
        type: string
      key:
        maxLength: 120
        type: string
      name:
        maxLength: 200
        type: string
      org_id:
        type: string
      status:
        enum:
        - pending
        - active
        - suspended
        type: string
    required:
    - base_url
    - jwks_url
    - key
    type: object
  geregetemplateai_internal_http_datatransfers_requests.FedPeerUpdateRequest:
    properties:
      base_url:
        type: string
      jwks_url:
        type: string
      name:
        maxLength: 200
        type: string
      org_id:
        type: string
      status:
        enum:
        - pending
        - active
        - suspended
        type: string
    required:
    - base_url
    - jwks_url
    - status
    type: object
  geregetemplateai_internal_http_datatransfers_requests.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  geregetemplateai_internal_http_datatransfers_requests.LoginRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  geregetemplateai_internal_http_datatransfers_requests.OrgCreateRequest:
    properties:
      kind:
        enum:
        - ministry
        - agency
        - soe
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      parent_id:
        type: string
    required:
    - name
    - parent_id
    type: object
  geregetemplateai_internal_http_datatransfers_requests.OrgUpdateRequest:
    properties:
      kind:
        enum:
        - root
        - ministry
        - agency
        - soe
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - name
    type: object
  geregetemplateai_internal_http_datatransfers_requests.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  geregetemplateai_internal_http_datatransfers_requests.RegisterRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 12
        type: string
      username:
        maxLength: 25
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  geregetemplateai_internal_http_datatransfers_requests.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 12
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  geregetemplateai_internal_http_datatransfers_requests.SendOTPRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  geregetemplateai_internal_http_datatransfers_requests.SetRolePermissionsRequest:
    properties:
      permissions:
        items:
          type: string
        type: array
    type: object
  geregetemplateai_internal_http_datatransfers_requests.UpdateRoleRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  geregetemplateai_internal_http_datatransfers_requests.VerifyOTPRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
    required:
    - code
    - email
    type: object
  geregetemplateai_internal_http_datatransfers_requests.VoiceSpeakRequest:
    properties:
      text:
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - text
    type: object
  geregetemplateai_internal_http_datatransfers_requests.VoiceTranscribeRequest:
    properties:
      audio_base64:
        type: string
      lang:
        enum:
        - mn
        - en
        type: string
      mime_type:
        enum:
        - audio/webm
        - audio/mp4
        - audio/ogg
        - audio/wav
        type: string
    required:
    - audio_base64
    - lang
    - mime_type
    type: object
  geregetemplateai_internal_http_datatransfers_requests.VoiceTranslateRequest:
    properties:
      audio_base64:
        type: string
      mime_type:
        description: |-
          MimeType-г allowlist-аар хязгаарлана — browser-ийн MediaRecorder-аас
          гардаг танигдсан багц л зөвшөөрнө (codecs параметрийг frontend хасдаг).
          Дурын мөрийг Gemini рүү дамжуулахгүй.
        enum:
        - audio/webm
        - audio/mp4
        - audio/ogg
        - audio/wav
        type: string
      source_lang:
        enum:
        - mn
        - en
        type: string
    required:
    - audio_base64
    - mime_type
    - source_lang
    type: object
  geregetemplateai_internal_http_datatransfers_responses.AIConversationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.AIKnowledgeResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      owner_email:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.AIMessageResponse:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMEventResponse:
    properties:
      created_at:
        type: string
      detail:
        type: string
      id:
        type: string
      node_id:
        type: string
      type:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMFormResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      schema:
        items:
          type: integer
        type: array
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMInstanceResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      current_node_id:
        type: string
      definition_id:
        type: string
      id:
        type: string
      status:
        type: string
      variables:
        items:
          type: integer
        type: array
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMProcessResponse:
    properties:
      bpmn:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMRunResponse:
    properties:
      done:
        type: boolean
      instance:
        $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.BPMInstanceResponse'
      task:
        $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.BPMTaskResponse'
    type: object
  geregetemplateai_internal_http_datatransfers_responses.BPMTaskResponse:
    properties:
      form:
        items:
          type: integer
        type: array
      id:
        type: string
      node_id:
        type: string
      status:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.FedPeerResponse:
    properties:
      base_url:
        type: string
      created_at:
        type: string
      id:
        type: string
      jwks_url:
        type: string
      key:
        type: string
      name:
        type: string
      org_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.FedStatusResponse:
    properties:
      configured:
        type: boolean
      node_id:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.OrganizationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      kind:
        type: string
      name:
        type: string
      parent_id:
        type: string
      path:
        type: string
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.PermissionResponse:
    properties:
      category:
        type: string
      key:
        type: string
      label:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.RoleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_system:
        type: boolean
      key:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      org_id:
        type: string
      refresh_token:
        type: string
      role_id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.VoiceSpeakResponse:
    properties:
      audio_base64:
        type: string
      audio_mime:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.VoiceTranscribeResponse:
    properties:
      text:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.VoiceTranslateResponse:
    properties:
      audio_base64:
        type: string
      audio_mime:
        type: string
      created_at:
        type: string
      id:
        type: string
      source_lang:
        type: string
      source_text:
        type: string
      target_lang:
        type: string
      translated_text:
        type: string
    type: object
  geregetemplateai_internal_http_datatransfers_responses.VoiceTranslationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      source_lang:
        type: string
      source_text:
        type: string
      target_lang:
        type: string
      translated_text:
        type: string
    type: object
  geregetemplateai_internal_http_handlers_v1.BaseResponse:
    properties:
      data: {}
      message:
        type: string
      request_id:
        type: string
      status:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Gerege Template AI v1.0
    url: https://github.com/snykk/go-rest-boilerplate
  description: Fiber v3 + GORM (PostgreSQL) + Redis дээр суурилсан Clean Architecture
    бүхий Go backend. Нээлттэй эхийн snykk/go-rest-boilerplate (MIT, зохиогч Najib
    Fikri)-ээс үүсэлтэй; Gin -> Fiber v3 болон sqlx -> GORM руу хөрвүүлсэн.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/snykk/go-rest-boilerplate
  title: Gerege Template AI v1.0 API
  version: "1.0"
paths:
  /ai/chat:
    post:
      consumes:
      - application/json
      description: 'Хэрэглэгчийн мессежийг харилцан ярианд нэмж, Claude-аас text/event-stream
        хэлбэрээр хариу урсгана. Event-ууд: meta (conversation_id), delta (текст хэсэг),
        done (message_id + токен зарцуулалт), error.'
      parameters:
      - description: Chat message
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.AIChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: Malformed body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Unauthenticated
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Daily limit exceeded
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "503":
          description: AI not configured
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: AI туслахтай streaming чат (SSE)
      tags:
      - ai
  /ai/conversations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIConversationResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Хэрэглэгчийн AI харилцан яриануудыг жагсаах
      tags:
      - ai
  /ai/conversations/{id}/messages:
    get:
      parameters:
      - description: Conversation ID (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIMessageResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Нэг харилцан ярианы мессежүүдийг авах
      tags:
      - ai
  /ai/knowledge:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIKnowledgeResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: AI мэдлэгийн бичлэгүүдийг жагсаах
      tags:
      - ai
    post:
      consumes:
      - application/json
      parameters:
      - description: Knowledge
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.AIKnowledgeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIKnowledgeResponse'
              type: object
      security:
      - BearerAuth: []
      summary: AI мэдлэгийн бичлэг үүсгэх
      tags:
      - ai
  /ai/knowledge/{id}:
    delete:
      parameters:
      - description: Knowledge ID (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: AI мэдлэгийн бичлэг устгах
      tags:
      - ai
    put:
      consumes:
      - application/json
      parameters:
      - description: Knowledge ID (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: Knowledge
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.AIKnowledgeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIKnowledgeResponse'
              type: object
      security:
      - BearerAuth: []
      summary: AI мэдлэгийн бичлэг засах
      tags:
      - ai
  /ai/knowledge/all:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.AIKnowledgeResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Бүх хэрэглэгчийн AI мэдлэг (admin)
      tags:
      - ai
  /auth/login:
    post:
      consumes:
      - application/json
      description: Access токен (богино TTL) болон refresh токен (урт TTL) буцаана.
        Хэрэглэгчийг тоолохоос сэргийлэхийн тулд буруу нууц үг болон тодорхойгүй email
        ижил хугацаа зарцуулна.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens issued
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account not yet activated
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Баталгаажуулж токен хос олгох
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: /auth/refresh татгалзахын тулд refresh-токены jti-г Redis-ээс устгана.
        Access токенууд байгалийн хугацаа дуустлаа хүчинтэй хэвээр үлдэнэ — клиентүүд
        тэдгээрийг logout хийх үед устгах ёстой.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Refresh token invalid
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Refresh токеныг хүчингүй болгох
      tags:
      - auth
  /auth/password/change:
    put:
      consumes:
      - application/json
      description: Одоогийн нууц үгийг шалгаж, шинээр сольж, цуцлалтын хязгаарыг тэмдэглэдэг
        тул одооноос өмнө олгогдсон refresh токенууд татгалзагдана.
      parameters:
      - description: Current + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Current password incorrect
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Баталгаажуулагдсан хэрэглэгчийн нууц үгийг солих
      tags:
      - auth
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Хаяг руу битүүмжилсэн сэргээх токеныг и-мэйлээр илгээнэ. Хэрэглэгчийг
        тоолохоос сэргийлэхийн тулд email бүртгэлгүй байсан ч үргэлж 200 буцаана.
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email queued (or email not registered — same response
            either way)
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Нууц үг сэргээх токен олгох
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      description: ForgotPassword-ийн олгосон токеныг баталгаажуулж, шинэ нууц үг
        тогтоож, цуцлалтын хязгаарыг урагшлуулна.
      parameters:
      - description: Reset token + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Reset token invalid or expired
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Сэргээх токеныг ашиглаж шинэ нууц үг тогтоох
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Өгөгдсөн refresh токеныг шалгаж, шинэ access+refresh хос үүсгэж,
        хуучин jti-г Redis-д хүчингүй болгоно. Аль хэдийн сэлгэгдсэн токеныг дахин
        тоглуулах нь 401 буцаана.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.UserResponse'
              type: object
        "401":
          description: Refresh token invalid, expired, or already revoked
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account no longer active
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Refresh токеныг сэлгэж, шинэ хос буцаах
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Хэрэглэгчийн бүртгэлийг идэвхгүй төлөвт үүсгэнэ. Дуудагч нь /auth/login
        амжилттай болохоос өмнө бүртгэлийг идэвхжүүлэхийн тулд /auth/send-otp + /auth/verify-otp-г
        дагах ёстой.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            allOf:
            - $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Email or username already in use
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error (per-field detail in data.errors)
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Шинэ хэрэглэгч бүртгэх
      tags:
      - auth
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: 6 оронтой OTP үүсгэж, TTL-тэйгээр Redis-д хадгалж, async mailer-ээр
        и-мэйлийг дараалалд оруулна. HTTP хариу нь бодит SMTP хүргэлт дээр биш, дараалалд
        оруулах үед буцдаг.
      parameters:
      - description: Email to send OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP enqueued
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Account already activated
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to enqueue mail
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: Хэрэглэгчийн email рүү OTP код илгээх
      tags:
      - auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Өгөгдсөн кодыг Redis-тэй тулгаж шалгаж, амжилттай үед хэрэглэгчийн
        active flag-г true болгоно. Brute-force-оос хамгаалагдсан — OTP_MAX_ATTEMPTS
        алдаа (өгөгдмөл 5) гарсны дараа зөв кодтой ч email нь OTP TTL цонхны турш
        түгжигдэнэ.
      parameters:
      - description: Email + OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/geregetemplateai_internal_http_datatransfers_requests.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Invalid OTP code
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Locked out — too many invalid attempts
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geregetemplateai_internal_http_handlers_v1.BaseResponse'
      summary: OTP кодыг шалгаж бүртгэлийг идэвхжүүлэх
      tags:
      - auth
